syntax="proto3";

option csharp_namespace = "gRoom.gRPC.Messages";

package groom;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Request message for registering a new room.
message RoomRegistrationRequest {
  string room_name = 1;
}

// Response message for room registration.
message RoomRegistrationResponse {
  int32  room_id   = 1 [json_name = "roomId"];
  string room_name = 2 [json_name = "roomName"];
}

// Message representing a news flash item.
message NewFlash {
  google.protobuf.Timestamp news_time = 1;
  string news_item = 2;
}

// Message representing the status of a news flash stream.
message NewStreamStatus {
  bool success = 1;
}

// Message representing a received message.
message ReceivedMessage {
  google.protobuf.Timestamp message_time = 1;
  string content = 2;
  string user=3;
}

// The groom service definition.
service Groom {
  // Registers a new room and returns its ID.
  rpc RegisterToRoom (RoomRegistrationRequest) returns (RoomRegistrationResponse);
  // Receives a stream of news flash items and returns a status message.
  rpc SendNewsFlash (stream NewFlash) returns (NewStreamStatus);
  // Starts monitoring for incoming messages and returns a stream of received messages.
  rpc StartMonitoring (google.protobuf.Empty) returns (stream ReceivedMessage);
}